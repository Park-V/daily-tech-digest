on Acemoglu shares his perspective on key AI developments to monitor, likely offering contrarian views that challenge Silicon Valley's conventional wisdom. His economic expertise provides valuable strategic insight into AI's broader implications for business and markets.","category":"Tech Strategy & Analysis"},{"title":"Where Reliability Lives in Vision-Language Models: A Mechanistic Study of Attention, Hidden States, and Causal Circuits","url":"https://arxiv.org/abs/2605.08200","source":"arXiv - AI","score":8,"summary":"This mechanistic study investigates reliability patterns in vision-language models by examining attention mechanisms and hidden states across major open-weight VLM families. The research provides technical insights into when VLMs can be trusted, which is crucial for enterprise deployment of multimodal AI systems.","category":"AI & Research"},{"title":"On Distinguishing Capability Elicitation from Capability Creation in Post-Training: A Free-Energy Perspective","url":"https://arxiv.org/abs/2605.08368","source":"arXiv - AI","score":8,"summary":"This arXiv paper introduces a theoretical framework distinguishing between 'capability elicitation' (surfacing existing model abilities) and 'capability creation' (developing new abilities) in LLM post-training. The research provides a free-energy perspective to operationalize this distinction, which could significantly impact how AI systems are developed and deployed.","category":"AI & Research"},{"title":"The Download: a Nobel winner on AI, and the case for fixing everything","url":"https://www.technologyreview.com/2026/05/12/1137103/the-download-nobel-winner-ai-maintenance-of-everything/","source":"MIT Technology Review","score":7,"summary":"MIT Technology Review newsletter featuring Nobel economist Daron Acemoglu's perspective on AI trends to watch. The article appears to focus on economic and strategic implications of AI development from an authoritative academic source.","category":"Tech Strategy & Analysis"},{"title":"Spatial Priming Outperforms Semantic Prompting: A Grid-Based Approach to Improving LLM Accuracy on Chart Data Extraction","url":"https://arxiv.org/abs/2605.08220","source":"arXiv - AI","score":7,"summary":"Research paper compares spatial vs semantic prompting methods for improving LLM accuracy in extracting data from scientific charts. The work addresses a practical challenge in automated document processing and multimodal AI applications.","category":"AI & Research"}]},{"type":"daily","date":"2026-05-11","run_at":"2026-05-11T17:32:34.225629+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":65,"articles_sent":15,"telegram_messages_sent":17,"big_picture":"**Today's Big Picture:** Enterprise AI adoption is reaching a critical inflection point where the gap between experimentation and production deployment is exposing fundamental strategic missteps—companies are cutting jobs in the name of AI transformation without proper implementation frameworks, while simultaneously struggling with organic AI adoption that outpaces governance structures. The technical landscape is revealing deeper complexities that challenge conventional wisdom: AI reasoning systems are showing increased bias with more deliberation, multi-agent systems require new diagnostic approaches to detect hidden coordination, and traditional security models are breaking under AI-assisted development cycles. For enterprise software buyers and ERP consultants, this signals that successful AI integration demands a fundamental shift from technology-first to customer-back engineering approaches, with robust governance frameworks that can match the pace of AI-driven organizational change rather than relying on outdated find-and-fix methodologies.","articles":[{"title":"Beyond the layoffs - will companies live to regret their AI-related job cuts? (Spoiler - they just might...)","url":"https://diginomica.com/beyond-layoffs-will-companies-live-regret-their-ai-related-job-cuts-spoiler-they-just-might","source":"Diginomica","score":8,"summary":"Article examines the strategic implications of AI-driven layoffs, distinguishing between genuine AI transformation and cost-cutting disguised as AI strategy. It analyzes how companies may face regret if they cut jobs without proper AI implementation planning.","category":"Enterprise & ERP"},{"title":"Import AI 456: RSI and economic growth; radical optionality for AI regulation; and a neural computer","url":"https://jack-clark.net/2026/05/11/import-ai-456-rsi-and-economic-growth-radical-optionality-for-ai-regulation-and-a-neural-computer/","source":"Import AI","score":8,"summary":"Import AI newsletter covering RSI and economic growth implications, AI regulation policy approaches including 'radical optionality' framework, and neural computing developments. Addresses strategic policy questions around AI governance and economic impacts that technology leaders need to understand.","category":"AI & Research"},{"title":"Hidden Coalitions in Multi-Agent AI: A Spectral Diagnostic from Internal Representations","url":"https://arxiv.org/abs/2605.06696","source":"arXiv - AI","score":9,"summary":"Researchers introduce a method to detect hidden coalition formation in multi-agent AI systems by analyzing internal neural representations rather than just observable behavior. This addresses a critical AI safety challenge where agents may coordinate internally before showing behavioral changes, with significant implications for enterprise AI deployment and alignment.","category":"AI & Research"},{"title":"Atlassian Team ’26 – Docusign shows how to adopt AI with trust, not just speed","url":"https://diginomica.com/atlassian-team-26-docusign-shows-how-adopt-ai-trust-not-just-speed","source":"Diginomica","score":7,"summary":"Docusign's implementation of Atlassian's Rovo AI tool demonstrates enterprise AI adoption focused on trust and responsible deployment rather than pure speed. The case study provides insights into how established comp ummary":"The article explores how AI is being adopted organically within finance departments before formal governance structures are established, creating regulatory and strategic challenges. It highlights the tension between employee-driven AI adoption and the need for enterprise controls in a highly regulated function.","category":"Tech Strategy & Analysis"},{"title":"CUDA Proves Nvidia Is a Software Company","url":"https://www.wired.com/story/cuda-proves-nvidia-is-a-software-company/","source":"Wired","score":9,"summary":"Analysis of how Nvidia's CUDA software platform creates a competitive moat that goes beyond hardware capabilities. Explores the strategic importance of software ecosystems in maintaining market dominance in the AI era.","category":"Broad Tech News"},{"title":"More Thinking, More Bias: Length-Driven Position Bias in Reasoning Models","url":"https://arxiv.org/abs/2605.06672","source":"arXiv - AI","score":8,"summary":"Research reveals that AI reasoning models like DeepSeek-R1 paradoxically become more biased as they engage in longer reasoning chains, contradicting assumptions that careful thinking reduces heuristic biases. The study shows position bias consistently increases with reasoning length across multiple model configurations.","category":"AI & Research"},{"title":"State Representation and Termination for Recursive Reasoning Systems","url":"https://arxiv.org/abs/2605.06690","source":"arXiv - AI","score":8,"summary":"This arXiv paper introduces a formal framework for recursive reasoning systems that alternate between evidence gathering and understanding refinement, addressing key design choices in state representation and termination criteria. The work presents epistemic state graphs and order-gap metrics that could advance AI agent architectures and autonomous reasoning capabilities.","category":"AI & Research"},{"title":"The patching treadmill: Why traditional application security is no longer enough","url":"https://www.zdnet.com/article/th  This addresses a key limitation of current LLMs in handling complex topological reasoning tasks.","category":"AI & Research"}]},{"type":"weekly","date":"2026-05-10","run_at":"2026-05-10T16:29:36.226525+00:00","days_covered":7,"articles_featured":17,"telegram_messages_sent":9,"big_picture":"**Week in Review**: Enterprise software buyers face a critical inflection point as agentic AI systems promise transformative automation but threaten to create \"agentic chaos\" without proper governance frameworks, forcing CIOs to choose between point solutions that risk organizational fragmentation and comprehensive platforms like ServiceNow that offer enterprise-wide orchestration. The shift toward outcome-based pricing models—where customers \"pay when agents work\"—signals that vendors are acknowledging the trust gap between AI hype and business reality, creating new opportunities for ERP consultants to guide clients toward implementations that deliver measurable ROI rather than superficial automation. With power infrastructure becoming a bottleneck for AI workloads and regulatory precedents like Meta's $375 million child safety settlement reshaping platform liability, enterprise buyers must now evaluate AI solutions not just on functionality but on governance capabilities, energy efficiency, and compliance frameworks that can scale across their entire technology stack."},{"type":"daily","date":"2026-05-09","run_at":"2026-05-09T16:12:54.711694+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":40,"articles_sent":1,"telegram_messages_sent":3,"big_picture":"**Today's Big Picture:** The ongoing Musk-OpenAI legal battle is exposing the intense power struggles and talent wars driving AI industry consolidation, revealing how personal conflicts between tech leaders directly impact the strategic direction of foundational AI technologies. For enterprise software buyers, this courtroom drama underscores the critical importance of vendor stability and leadership continuity whe ther/","source":"ZDNet Enterprise","score":8,"summary":"Article provides practical guidance on implementing AI agents in enterprise environments, focusing on governance, evaluation, and incremental deployment strategies. Addresses key operational considerations for organizations looking to move AI agents from pilot to production.","category":"Enterprise & ERP"},{"title":"The 5 myths of the agentic coding apocalypse","url":"https://www.zdnet.com/article/agentic-coding-apocalypse/","source":"ZDNet Enterprise","score":8,"summary":"Article examines critical risks and misconceptions around agentic AI in software development, focusing on testing, security, and maintenance challenges that could impact enterprise deployments. Addresses how developers need to rethink supervision and validation of AI-generated code at scale.","category":"Enterprise & ERP"},{"title":"How this travel company's AI rollout drove a 73% satisfaction boost: A 5-step playbook for your business","url":"https://www.zdnet.com/article/ai-rollout-playbook-for-businesses-to-drive-user-satisfaction/","source":"ZDNet Enterprise","score":7,"summary":"A practical case study showing how a travel company implemented AI agents to achieve measurable business results, with a structured playbook for enterprise deployment. Demonstrates real-world AI agent implementation with concrete metrics and actionable steps for other businesses.","category":"Enterprise & ERP"},{"title":"Tailoring AI solutions for health care needs","url":"https://www.technologyreview.com/2026/05/04/1134425/tailoring-ai-solutions-for-health-care-needs/","source":"MIT Technology Review","score":7,"summary":"Article discusses AI applications in healthcare, targeting various functions from cancer treatment to surgery and administrative streamlining. Healthcare represents a major enterprise market with significant financial pressures and operational challenges that AI is positioned to address.","category":"Tech Strategy & Analysis"},{"title":"Live updates from Elon Musk and Sam Altman’s court battle over the future of OpenAI","url":"https://www.theverge.com/tech/917225/sam-altman-elon-musk-openai-lawsuit","source":"The Verge","score":9,"summary":"Elon Musk is suing OpenAI and Sam Altman, claiming the company abandoned its founding mission to develop AI for humanity's benefit in favor of profit maximization. This high-stakes legal battle could fundamentally reshape OpenAI's structure and the broader AI industry's approach to commercialization versus public benefit.","category":"Broad Tech News"},{"title":"Amazon&#8217;s trying to turn its massive shipping operation into another AWS","url":"https://www.theverge.com/tech/923013/amazon-supply-chain-services","source":"The Verge","score":8,"summary":"Amazon is launching Supply Chain Services to monetize its logistics infrastructure as a service to third-party businesses, similar to how AWS monetized its internal IT infrastructure. This represents a major strategic shift that could disrupt traditional logistics providers like UPS, FedEx, and DHL while creating a new revenue stream from Amazon's operational capabilities.","category":"Broad Tech News"},{"title":"Dara Khosrowshahi on replacing Uber drivers — and himself — with AI","url":"https://www.theverge.com/podcast/922909/dara-khosrowshahi-uber-drivers-ai-hotels-service","source":"The Verge","score":8,"summary":"Uber CEO discusses AI's role in potentially replacing drivers and even executive functions, representing a major strategic shift for the platform economy. This signals how AI automation could fundamentally reshape labor-intensive business models and organizational structures.","category":"Broad Tech News"},{"title":"Tesla hits Musk’s threshold for ‘safe unsupervised’ driving","url":"https://www.theverge.com/transportation/922900/tesla-10-billion-miles-unsupervised-fsd-robotaxi-elon-musk","source":"The Verge","score":7,"summary":"Tesla's FSD fleet has reached 10 billion miles, crossing Musk's previously stated threshold for 'safe unsupervised' driving, though the actual deployment of unsupervised capabilities remains unclear. This milestone represents a significant data accumulation achievement in autonomous driving development.","category":"Broad Tech News"}]},{"type":"daily","date":"2026-05-03","run_at":"2026-05-03T16:06:37.563251+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":36,"articles_sent":1,"telegram_messages_sent":3,"big_picture":"Today's Big Picture: Meta's $375 million child safety settlement with New Mexico signals a new era of aggressive regulatory enforcement that will likely cascade across the entire enterprise software landscape, forcing companies to dramatically elevate their compliance and safety frameworks. This precedent suggests that software vendors can no longer rely on traditional liability limitations when their platforms cause demonstrable harm, creating significant new risk calculations for enterprise buyers who must now evaluate vendors' regulatory exposure alongside technical capabilities. ERP solution consultants should immediately begin incorporating regulatory compliance assessments and vendor liability reviews into their evaluation frameworks, as the days of treating legal risk as a secondary consideration are rapidly ending.","articles":[{"title":"Meta&#8217;s historic loss in court could cost a lot more than $375 million","url":"https://www.theverge.com/policy/922380/new-mexico-meta-public-nuisance-trial-kids-safety","source":"The Verge","score":7,"summary":"New Mexico won a $375 million settlement against Meta in a child safety case, with potentially larger consequences ahead as legal proceedings continue. This represents a significant regulatory and legal precedent that could reshape how social media platforms handle child safety and face liability.","category":"Broad Tech News"}]},{"type":"weekly","date":"2026-05-03","run_at":"2026-05-03T16:11:11.537678+00:00","days_covered":5,"articles_featured":12,"telegram_message ts manufactured outside the US, representing a significant policy shift affecting the networking hardware market. This regulatory action reflects broader geopolitical tensions and supply chain security concerns that could reshape technology procurement strategies.","category":"Broad Tech News"},{"title":"LLMs consistently pick resumes they generate over ones by humans or other models","url":"https://arxiv.org/abs/2509.00462","source":"Hacker News","score":7,"summary":"Study shows LLMs exhibit bias toward their own generated resumes when evaluating candidates, revealing potential issues with AI decision-making systems. This highlights important concerns about AI reliability and bias in enterprise hiring and evaluation processes.","category":"Community & Practitioner"},{"title":"Open Design: Use Your Coding Agent as a Design Engine","url":"https://github.com/nexu-io/open-design","source":"Hacker News","score":7,"summary":"Article discusses using coding agents as design engines, representing a practical application of AI agents in software development workflows. This touches on the evolving capabilities of agentic AI systems beyond pure coding to include design thinking.","category":"Community & Practitioner"},{"title":"All the evidence revealed so far in Musk v. Altman","url":"https://www.theverge.com/ai-artificial-intelligence/920775/evidence-exhibits-elon-musk-sam-altman-openai-trial","source":"The Verge","score":7,"summary":"Legal case between Musk and Altman revealing early OpenAI documents and email exchanges from the company's founding period. The evidence provides insights into the strategic decisions and dynamics that shaped one of the most influential AI companies.","category":"Broad Tech News"}]},{"type":"daily","date":"2026-05-01","run_at":"2026-05-01T16:30:43.407777+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":78,"articles_sent":15,"telegram_messages_sent":17,"big_picture":"**Today's Big Picture:** Enterprise AI is rapidly transitioning fro -agent AI","url":"https://arxiv.org/abs/2604.27096","source":"arXiv - AI","score":9,"summary":"This paper presents a breakthrough five-agent system that automatically generates complete ML pipelines from natural language goals, representing a significant advance in autonomous AI workflows. The approach combines code-grounded RAG with explainable hybrid recommendation systems to handle end-to-end pipeline generation without human intervention.","category":"AI & Research"},{"title":"Atlassian Service Collection hits $1 billion ARR – Q3 FY2026 brings record displacements and a data center surprise","url":"https://diginomica.com/atlassian-service-collection-hits-1-billion-arr-q3-fy2026-brings-record-displacements-and-data","source":"Diginomica","score":7,"summary":"Atlassian's Service Collection reaches $1 billion ARR milestone with 32% revenue growth to $1.8 billion, indicating strong enterprise software market performance. New CFO emphasizes underlying ARR metrics over headline revenue numbers, suggesting focus on sustainable recurring revenue growth.","category":"Enterprise & ERP"},{"title":"Hopping over the debt - Process Intelligence can show banks how they operate, not how they think they operate","url":"https://diginomica.com/hopping-over-debt-process-intelligence-can-show-banks-how-they-operate-not-how-they-think-they","source":"Diginomica","score":7,"summary":"Article discusses how Process Intelligence can help legacy banks modernize without replacing core systems by revealing gaps between perceived and actual operational processes. Focuses on practical enterprise software solutions for financial institutions facing digital transformation challenges.","category":"Enterprise & ERP"},{"title":"We may now know what kind of AI bubble this is","url":"https://www.platformer.news/ai-bubble-railroad-mythos-openai-trial/","source":"Platformer","score":8,"summary":"Article analyzes the current AI investment bubble by comparing it to historical railroad infrastructure bui ps://arxiv.org/abs/2604.27082","source":"arXiv - AI","score":8,"summary":"This research presents a practical Bayesian framework for migrating production LLM systems when models reach end-of-life, using automated evaluation calibrated against human judgment. The work addresses a critical enterprise AI challenge with real-world validation on a system serving 5.3M monthly interactions.","category":"AI & Research"},{"title":"Trump’s mass firing just dealt another blow to American science","url":"https://www.technologyreview.com/2026/05/01/1136722/mass-firing-trump-fresh-blow-american-science-nsf-nsb/","source":"MIT Technology Review","score":7,"summary":"Trump administration fired the entire 22-member National Science Foundation board, which oversees $9 billion in federal research funding. This represents a significant policy shift that could impact technology research and development across multiple sectors.","category":"Tech Strategy & Analysis"},{"title":"Pentagon strikes classified AI deals with OpenAI, Google, and Nvidia — but not Anthropic","url":"https://www.theverge.com/ai-artificial-intelligence/922113/pentagon-ai-classified-openai-google-nvidia","source":"The Verge","score":9,"summary":"The Pentagon has approved AI tools from OpenAI, Google, Microsoft, Amazon, Nvidia, and xAI for classified use while notably excluding Anthropic. This represents a major shift in how the Defense Department approaches AI deployment in sensitive national security contexts.","category":"Broad Tech News"}]},{"type":"daily","date":"2026-04-27","run_at":"2026-04-27T21:38:02.679887+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":67,"articles_sent":15,"telegram_messages_sent":17,"big_picture":"**Today's Big Picture:**\n\nEnterprise AI adoption is hitting reality as organizations discover that data infrastructure rebuilds and workforce transformation are the primary challenges, not the AI models themselves—as evidenced by IBM positioning itself as \"AI Switzerland\" and Merc ack decisions now that will determine their competitive positioning for years. For ERP consultants and enterprise software buyers, this represents a critical inflection point: organizations must immediately begin evaluating agentic AI platforms and data architecture foundations while preparing for a constrained hardware environment that will reward early, thoughtful AI infrastructure investments over rushed implementations."},{"type":"daily","date":"2026-04-25","run_at":"2026-04-25T16:01:56.923906+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":42,"articles_sent":3,"telegram_messages_sent":5,"big_picture":"**Today's Big Picture:** The AI foundation model landscape is rapidly intensifying with both breakthrough innovations and massive financial consolidation, as seen in DeepSeek's V4 release and Google's potential $40B Anthropic investment, signaling that AI capabilities are advancing faster than many enterprises anticipated. However, the Discord breach of Anthropic's internal systems exposes critical security vulnerabilities that enterprise software buyers must now factor into their AI procurement strategies, particularly as they evaluate vendors' data protection capabilities. For ERP solution consultants, this trifecta of events underscores the urgent need to help clients develop AI integration roadmaps that balance competitive advantage with robust security frameworks, as the window for strategic AI adoption is narrowing while the stakes continue rising.","articles":[{"title":"Three reasons why DeepSeek’s new model matters","url":"https://www.technologyreview.com/2026/04/24/1136422/why-deepseeks-v4-matters/","source":"MIT Technology Review","score":9,"summary":"DeepSeek released V4, a new open-source flagship AI model with significantly improved ability to process longer prompts through more efficient text handling. This represents a major advancement in foundation model capabilities from a Chinese AI firm, with potential strategic implications for the global AI landscape.","category":"Tech Strategy & Analysis"},{"title":"Google plans to invest up to $40B in Anthropic","url":"https://www.bloomberg.com/news/articles/2026-04-24/google-plans-to-invest-up-to-40-billion-in-anthropic","source":"Hacker News","score":9,"summary":"Google's potential $40B investment in Anthropic would be a massive strategic move in the AI foundation model race, potentially reshaping competitive dynamics between tech giants. This level of investment signals serious enterprise AI ambitions and could significantly impact the AI market structure.","category":"Community & Practitioner"},{"title":"Discord Sleuths Gained Unauthorized Access to Anthropic’s Mythos","url":"https://www.wired.com/story/security-news-this-week-discord-sleuths-gained-unauthorized-access-to-anthropics-mythos/","source":"Wired","score":7,"summary":"Discord users gained unauthorized access to Anthropic's internal systems or data related to 'Mythos', suggesting a security breach at a major AI company. This highlights cybersecurity vulnerabilities at leading AI firms and potential risks to proprietary AI development.","category":"Broad Tech News"}]},{"type":"daily","date":"2026-04-24","run_at":"2026-04-24T16:31:27.861672+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":58,"articles_sent":15,"telegram_messages_sent":17,"big_picture":"**Today's Big Picture:** Enterprise AI is hitting a critical inflection point where technical capabilities are advancing rapidly, but fundamental challenges around control, alignment, and resource constraints are creating new bottlenecks that could reshape deployment strategies. The convergence of compute shortages, alignment faking in AI models, and the need for custom integration work suggests that enterprise buyers should prepare for a more complex, expensive, and politically-charged AI adoption cycle than initially anticipated. Meanwhile, the shift toward government-led AI adoption and geopolitical competition for AI sovereignty means that enterprise software decisions are increasingly becoming strategic national security considerations, requiring ERP consultants to factor regulatory compliance and data residency into every major system recommendation.","articles":[{"title":"Next '26 - when you don't have enterprise legacy, you build it. Google Cloud's playbook for winning agentic AI trust.","url":"https://diginomica.com/next-26-when-you-dont-have-enterprise-legacy-you-build-it-google-clouds-playbook-winning-agentic-ai","source":"Diginomica","score":9,"summary":"Google Cloud is building enterprise credibility through hands-on partnerships and co-investment to compete in agentic AI, compensating for its lack of decades-long enterprise relationships. The strategy focuses on proving AI agents' value directly in customer environments, with scalability being the critical question.","category":"Enterprise & ERP"},{"title":"Bull speed ahead! Can France re-build AI sovereignty with Bull acquisition?","url":"https://diginomica.com/bull-speed-ahead-can-france-re-build-ai-sovereignty-bull-acquisition","source":"Diginomica","score":8,"summary":"France's government acquisition of Bull represents a significant geopolitical move to build sovereign AI capabilities, challenging US/China AI dominance. This reflects broader European concerns about strategic technology independence and could influence how other nations approach AI sovereignty.","category":"Enterprise & ERP"},{"title":"We're all on a learning curve when it comes to AI, says SAP CEO Christian Klein - and, yes, that includes SAP","url":"https://diginomica.com/were-all-learning-curve-when-it-comes-ai-says-sap-ceo-christian-klein-and-yes-includes-sap","source":"Diginomica","score":8,"summary":"SAP CEO Christian Klein acknowledges the company and entire industry are in early stages of implementing agentic AI systems. The interview covers SAP's strategic approach to enterprise AI deployment and the learning curve all major enterprise software vendors egory":"Enterprise & ERP"},{"title":"I put GPT-5.5 through a 10-round test: It scored 93/100, losing points only for exuberance","url":"https://www.zdnet.com/article/i-put-openai-gpt-5-5-through-a-10-round-test/","source":"ZDNet Enterprise","score":8,"summary":"OpenAI's GPT-5.5 achieves impressive 93/100 test performance but struggles with following simple directions, highlighting a key tension between AI capability and controllability. This control challenge is critical for enterprise deployment where adherence to specific workflows and constraints is essential.","category":"Enterprise & ERP"},{"title":"Government adoption of AI agents could outpace the private sector","url":"https://www.zdnet.com/article/government-adoption-of-ai-agents-may-outpace-the-private-sector/","source":"ZDNet Enterprise","score":8,"summary":"Government leaders surveyed believe AI will have greater workforce impact than previous transformative technologies like the internet and smartphones, with government AI adoption potentially leading private sector implementation. This suggests significant policy and competitive implications as public sector becomes an AI testing ground.","category":"Enterprise & ERP"},{"title":"Escaping the Agreement Trap: Defensibility Signals for Evaluating Rule-Governed AI","url":"https://arxiv.org/abs/2604.20972","source":"arXiv - AI","score":8,"summary":"Research paper introduces new evaluation metrics (Defensibility Index and Ambiguity Index) for AI systems in rule-governed environments like content moderation, addressing critical flaws in current agreement-based evaluation methods. The work tackles a fundamental problem in deploying AI systems for policy enforcement and regulatory compliance contexts.","category":"AI & Research"},{"title":"Co-Evolving LLM Decision and Skill Bank Agents for Long-Horizon Tasks","url":"https://arxiv.org/abs/2604.20987","source":"arXiv - AI","score":8,"summary":"Research paper introduces a novel architecture for LLM-based agents that can maintain and evolve skill banks for complex, multi-step decision making in long-horizon environments. This addresses a key limitation of current LLMs in autonomous workflow applications where consistent reasoning over extended periods is critical.","category":"AI & Research"},{"title":"AI Governance under Political Turnover: The Alignment Surface of Compliance Design","url":"https://arxiv.org/abs/2604.21103","source":"arXiv - Economics & Tech Policy","score":8,"summary":"Academic research examining how AI governance frameworks in government create 'compliance layers' that can be gamed by political successors while maintaining appearance of lawful administration. Explores the tension between AI oversight mechanisms and political manipulation of automated decision-making systems.","category":"AI & Research"},{"title":"Ideological Bias in LLMs' Economic Causal Reasoning","url":"https://arxiv.org/abs/2604.21334","source":"arXiv - Economics & Tech Policy","score":8,"summary":"Research reveals systematic ideological bias in large language models when reasoning about economic causality, with models showing different conclusions based on pro-government vs pro-market perspectives. This has direct implications for LLMs being deployed in policy analysis and economic reporting where accurate causal reasoning is critical.","category":"AI & Research"},{"title":"Community Votes to Deny Water to Nuclear Weapons Data Center","url":"https://www.404media.co/community-votes-to-deny-water-to-nuclear-weapons-data-center/","source":"404 Media","score":8,"summary":"A township has placed a 365-day water moratorium on a planned AI data center for America's nuclear weapons scientists, highlighting infrastructure constraints facing AI deployment. This represents a collision between national security AI initiatives and local resource governance that could signal broader challenges for data center expansion.","category":"Tech Strategy & Analysis"},{"title":"The week that Meta employees became training data","url":"https://www.platformer.news/meta-mci-monitoring-layoffs-knowledge-work/","source":"Platformer","score":7,"summary":"Meta is implementing invasive employee monitoring systems while conducting layoffs, raising questions about surveillance-driven management in tech companies. This represents a broader shift toward data-driven workforce optimization that could reshape knowledge work across the industry.","category":"Tech Strategy & Analysis"}]},{"type":"daily","date":"2026-04-23","run_at":"2026-04-23T04:17:12.096165+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":49,"articles_sent":15,"telegram_messages_sent":17,"big_picture":"**Today's Big Picture:** Enterprise AI is rapidly evolving from experimental chatbots to autonomous agents that can perform complex business tasks, with major platforms like Google Cloud, ServiceNow, and OpenAI positioning themselves as the control layers for this agentic future—making platform choice increasingly strategic for long-term competitive advantage. However, significant technical challenges around AI reliability, tool overuse, and behavioral consistency are emerging alongside growing regulatory concerns about systemic risks, requiring enterprise buyers to balance aggressive AI adoption with robust governance frameworks. For ERP consultants, this represents a fundamental shift toward advising on AI orchestration platforms and agent management rather than traditional software integration, as the winners will be those who can navigate both the immense productivity potential and the substantial operational risks of autonomous AI systems.","articles":[{"title":"Next '26 - control the agents, control the enterprise? Google Cloud enters the battle for enterprise AI governance","url":"https://diginomica.com/next-26-control-agents-control-enterprise-google-cloud-enters-battle-enterprise-ai-governance","source":"Diginomica","score":9,"summary":"Google Cloud is positioning itself as a key platform for enterprise AI governance and agentic AI systems, potentially following either an open Android-like strategy or closed iOS-like approach. The focus on controlling AI agents in enterprise settings represents a critical strategic battle for platform dominance in the next phase of business automation.","category":"Enterprise & ERP"},{"title":"ServiceNow beats Q1 2026 guidance as AI deals accelerate (and outcome-based pricing? Zavery isn't buying it)","url":"https://diginomica.com/servicenow-beats-q1-2026-guidance-ai-deals-accelerate-and-outcome-based-pricing-zavery-isnt-buying","source":"Diginomica","score":8,"summary":"ServiceNow's strong Q1 2026 earnings beat driven by AI deal acceleration represents a significant validation of enterprise AI adoption at scale. The discussion with CPO Amit Zavery on outcome-based pricing models reveals strategic shifts in how enterprise software vendors are monetizing AI capabilities.","category":"Enterprise & ERP"},{"title":"Behavioral Transfer in AI Agents: Evidence and Privacy Implications","url":"https://arxiv.org/abs/2604.19925","source":"arXiv - Economics & Tech Policy","score":9,"summary":"Research with 10,659 human-agent pairs examines whether AI agents reflect their users' behavioral patterns, suggesting agents function as behavioral extensions rather than generic tools. This has major implications for AI deployment in business contexts and privacy regulation as agents increasingly act on behalf of humans.","category":"AI & Research"},{"title":"Google brings Auto Browse and Skills to Chrome Enterprise - and a new 'Gemini Summary'","url":"https://www.zdnet.com/article/google-chrome-enterprise-update-auto-browse-skills-gemini-summary/","source":"ZDNet Enterprise","score":8,"summary":"Google is integrating AI automation capabilities directly into Chrome Enterprise, including Auto Browse for task automation and one-click workflows, positioning the browser as an AI workspace. This represents a significant strategic shift toward agentic AI in enterprise environments with potential implications for how businesses interact with web-based applications.","category":"Enterprise & ERP"},{"title":"The Tool-Overuse Illusion: Why Does LLM Prefer External Tools over Internal Knowledge?","url":"https://arxiv.org/abs/2604.19749","source":"arXiv - AI","score":8,"summary":"Research identifies 'tool overuse' phenomenon where LLMs unnecessarily rely on external tools instead of internal knowledge, revealing systematic misjudgments about their own capabilities. This has direct implications for enterprise AI agent deployment and efficiency optimization.","category":"AI & Research"},{"title":"Explainable AML Triage with LLMs: Evidence Retrieval and Counterfactual Checks","url":"https://arxiv.org/abs/2604.19755","source":"arXiv - AI","score":8,"summary":"Research presents an explainable AI framework for anti-money laundering transaction monitoring that addresses hallucination and compliance risks when deploying LLMs in regulated financial workflows. The work tackles the critical challenge of making AI decisions auditable and faithful in high-stakes financial compliance environments.","category":"AI & Research"},{"title":"OpenAI now lets teams make custom bots that can do work on their own","url":"https://www.theverge.com/ai-artificial-intelligence/917065/openai-chatgpt-workspace-agents-custom-teams-bots","source":"The Verge","score":9,"summary":"OpenAI launches enterprise-focused AI agents that can autonomously perform business tasks like finding product feedback and sales activities within ChatGPT workspaces. This represents a significant step toward agentic AI deployment in enterprise environments, directly competing with traditional business software vendors.","category":"Broad Tech News"},{"title":"WorkflowGen:an adaptive workflow generation mechanism driven by trajectory experience","url":"https://arxiv.org/abs/2604.19756","source":"arXiv - Machine Learning","score":8,"summary":"WorkflowGen presents a framework to make LLM agents more efficient by reusing past experiences rather than generating workflows from scratch, addressing key enterprise challenges of cost and reliability. This tackles fundamental bottlenecks in deploying AI agents for complex business workflows like tool orchestration and business queries.","category":"AI & Research"},{"title":"Accelerating PayPal's Commerce Agent with Speculative Decoding: An Empirical Study on EAGLE3 with Fine-Tuned Nemotron Models","url":"https://arxiv.org/abs/2604.19767","source":"arXiv - Machine Learning","score":8,"summary":"PayPal is using advanced speculative decoding techniques (EAGLE3) to optimize their Commerce Agent, achieving 22-49% throughput improvements with fine-tuned models. This represents a concrete example of how major enterprises are deploying sophisticated AI optimization techniques for real business applications.","category":"AI & Research"},{"title":"Expert Upcycling: Shifting the Compute-Efficient Frontier of Mixture-of-Experts","url":"https://arxiv.org/abs/2604.19835","source":"arXiv - Machine Learning","score":8,"summary":"This paper introduces expert upcycling for Mixture-of-Experts models, a technique to efficiently scale large language models by progressively growing expert count while reducing training costs. The method addresses a critical bottleneck in training frontier AI models by optimizing the compute-memory tradeoff in MoE architectures.","category":"AI & Research"},{"title":"5 AI Models Tried to Scam Me. Some of Them Were Scary Good","url":"https://www.wired.com/story/ai-model-phishing-attack-cybersecurity/","source":"Wired","score":8,"summary":"Article examines AI models' capabilities in social engineering and deception, revealing concerning proficiency in scamming attempts. This highlights critical security and regulatory implications as AI agents become more sophisticated and deployed in enterprise environments.","category":"Broad Tech News"},{"title":"Algorithm Selection with Zero Domain Knowledge via Text Embeddings","url":"https://arxiv.org/abs/2604.19753","source":"arXiv - AI","score":7,"summary":"Researchers propose ZeroFolio, a method that uses pretrained text embeddings to automatically select algorithms for different problems without domain expertise or hand-crafted features. This represents a step toward more generalized AI systems that can adapt to new domains without specialized training.","category":"AI & Research"},{"title":"Routine Work, Firm Boundaries, and the Rise of Local Supplier Entry","url":"https://arxiv.org/abs/2604.19987","source":"arXiv - Economics & Tech Policy","score":7,"summary":"Academic research analyzing how routine cognitive work outsourcing is driving increased business formation but lower conversion to employer firms, suggesting technology is reshaping firm boundaries and supplier ecosystems. The study provides quantitative evidence that areas with higher routine work shares see more business applications, indicating structural changes in how work is organized.","category":"AI & Research"},{"title":"Elon Musk admits that millions of Tesla vehicles won&#8217;t get unsupervised FSD","url":"https://www.theverge.com/transportation/917167/elon-musk-tesla-hw3-fsd","source":"The Verge","score":8,"summary":"Elon Musk revealed that 4 million Tesla vehicles with Hardware 3 won't receive unsupervised Full Self-Driving capability, breaking promises to customers who paid for the feature. This represents a significant strategic misstep affecting Tesla's autonomous vehicle roadmap and customer trust.","category":"Broad Tech News"},{"title":"AI failure could trigger the next financial crisis, warns Elizabeth Warren","url":"https://www.theverge.com/policy/917026/ai-economy-bubble-elizabeth-warren","source":"The Verge","score":8,"summary":"Senator Elizabeth Warren warns that AI could trigger the next financial crisis, drawing parallels to the 2008 recession. This represents significant policy concern about AI's systemic risks to financi two major enterprise technology leaders signals a significant shift toward AI agents handling real business processes.","category":"Enterprise & ERP"},{"title":"Early AI adopters stumble across the horror of vendor lock-in. Here we go again?","url":"https://diginomica.com/early-ai-adopters-stumble-across-horror-vendor-lock-here-we-go-again","source":"Diginomica","score":8,"summary":"Enterprise AI adopters are encountering vendor lock-in issues, a recurring problem that could significantly impact AI strategy and technology stack decisions. This highlights critical strategic considerations for companies deploying AI systems at scale.","category":"Enterprise & ERP"},{"title":"Enterprise hits and misses - CIOs reckon with AI use cases, and bring on the agentic substrate debate","url":"https://diginomica.com/enterprise-hits-and-misses-cios-reckon-ai-use-cases-and-bring-agentic-substrate-debate","source":"Diginomica","score":8,"summary":"Analysis of enterprise AI adoption challenges facing CIOs, including discussion of agentic AI systems and Salesforce's strategic positioning. Covers the emerging debate around agentic substrate and practical AI implementation decisions for business leaders.","category":"Enterprise & ERP"},{"title":"Moonshot AI's new Kimi K2.6 swarms your complex tasks with 1,000 collaborating agents","url":"https://www.zdnet.com/article/moonshot-ai-kimi-k2-6-swarms-complex-tasks-collaborating-agents/","source":"ZDNet Enterprise","score":9,"summary":"Moonshot AI's Kimi K2.6 introduces a system of 1,000 collaborating AI agents that can handle complex, multi-step engineering workflows. This represents a significant advancement in agentic AI systems that could transform how enterprises approach automated task execution and workflow management.","category":"Enterprise & ERP"},{"title":"DEI DOA?  Does IBM’s $17m Trump 2.0 settlement signify the death of Diversity, Equity, and Inclusion?","url":"https://diginomica.com/dei-doa-does-ibms-17m-trump-20-settlement-signify-death-diversity-equity-and-inclusion","source":"Diginomica","score":7,"summary":"IBM settled a $17M lawsuit related to DEI practices, which could signal broader corporate shifts away from diversity programs under Trump 2.0. The settlement may influence how other tech companies approach DEI initiatives and compliance strategies.","category":"Enterprise & ERP"},{"title":"Vibe coding requires more than a vibe","url":"https://diginomica.com/vibe-coding-requires-more-than-vibe","source":"Diginomica","score":7,"summary":"Zoho executive discusses how 'vibe coding' (likely AI-assisted development) creates opportunities for SaaS vendors to provide guidance and guardrails rather than being displaced. The piece addresses how enterprise software companies can adapt their strategy around non-developer coding capabilities.","category":"Enterprise & ERP"},{"title":"Why UBI is making a comeback","url":"https://www.platformer.news/ubi-ai-public-wealth-fund-musk-openai-bores/","source":"Platformer","score":7,"summary":"Tech companies are promoting Universal Basic Income as a potential solution to address public concerns about AI-driven job displacement and economic disruption. The article examines this strategic positioning but expresses skepticism about the motivations and effectiveness of such proposals.","category":"Tech Strategy & Analysis"},{"title":"John Ternus to become Apple CEO","url":"https://www.apple.com/newsroom/2026/04/tim-cook-to-become-apple-executive-chairman-john-ternus-to-become-apple-ceo/","source":"Hacker News","score":8,"summary":"This appears to be about a major leadership change at Apple, with John Ternus potentially becoming CEO. Leadership transitions at major tech companies like Apple have significant strategic implications for the industry and competitive dynamics.","category":"Community & Practitioner"},{"title":"This AI Tool Rips Off Open Source Software Without Violating Copyright","url":"https://www.404media.co/this-ai-tool-rips-off-open-source-software-without-violating-copyright/","source":"404 Media","score":7,"summary":"Malus is a satirical but functional AI tool that creates 'clean room' clones of open source software, potentially allowing users to commercialize derivatives without attribution. This highlights emerging tensions around AI's ability to replicate code while technically avoiding copyright infringement.","category":"Tech Strategy & Analysis"},{"title":"John Ternus’ first big problem is AI","url":"https://www.theverge.com/ai-artificial-intelligence/915662/john-ternus-apple-ceo-tim-cook-ai-problem-siri","source":"The Verge","score":8,"summary":"Apple announces John Ternus as Tim Cook's successor as CEO, with AI strategy being a critical challenge for the new leadership. The timing highlights Apple's ongoing struggle to compete in the AI space despite the technology's growing importance to tech companies.","category":"Broad Tech News"},{"title":"BASIS: Balanced Activation Sketching with Invariant Scalars for \"Ghost Backpropagation\"","url":"https://arxiv.org/abs/2604.16324","source":"arXiv - Machine Learning","score":7,"summary":"BASIS introduces a new technique to reduce memory requirements for training deep neural networks by addressing the linear scaling bottleneck in backpropagation. This could enable training of much larger models that were previously memory-constrained.","category":"AI & Research"},{"title":"A Discordance-Aware Multimodal Framework with Multi-Agent Clinical Reasoning","url":"https://arxiv.org/abs/2604.16333","source":"arXiv - Machine Learning","score":7,"summary":"Research proposes a multi-agent AI system for medical decision support that addresses discordance between imaging data and patient symptoms in knee osteoarthritis diagnosis. The framework combines multimodal ML models with agent-based reasoning for clinical interpretation.","category":"AI & Research"}]},{"type":"daily","date":"2026-04-20","run_at":"2026-04-20T09:43:39.592184+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":38,"articles_sent":10,"telegram_messages_sent":12,"big_picture":"**Today's Big Picture:** Enterprise AI deployment is hitting a critical inflection point where the gap between marketing promises and operational reality is becoming impossible to ignore—Chinese tech workers training their own AI replacements and the pushback against \"autonomous\" AI terminology both signal that organizations need honest frameworks for AI capabilities rather than aspirational ones. Meanwhile, significant technical breakthroughs in reasoning coordination (LACE), memory efficiency (KV cache compression), and selective fine-tuning (Aletheia) are maturing the infrastructure needed for practical enterprise AI deployment, moving beyond proof-of-concept toward production-ready systems. For ERP consultants and enterprise buyers, this means the window is closing on AI experimentation and opening on strategic implementation—but success will depend on realistic expectations, robust change management, and technical architectures that can scale efficiently rather than simply scale expensively.","articles":[{"title":"Monday Morning Moan - stop saying autonomy, before things really get out of control","url":"https://diginomica.com/monday-morning-moan-stop-saying-autonomy-things-really-get-out-control","source":"Diginomica","score":8,"summary":"Article challenges the dangerous misuse of 'autonomous' terminology in AI discourse, arguing it creates unrealistic expectations about AI agency capabilities. Focuses on the critical distinction between AI assistance and true autonomy, with implications for enterprise AI deployment and regulation.","category":"Enterprise & ERP"},{"title":"Chinese tech workers are starting to train their AI doubles–and pushing back","url":"https://www.technologyreview.com/2026/04/20/1136149/chinese-tech-workers-ai-colleagues/","source":"MIT Technology Review","score":9,"summary":"Chinese tech workers are being required to train AI agents to replace themselves, creating workforce tensions and highlighting the real-world deployment of AI automation in enterprise settings. This represents a significant shift in how AI is being implemented organizationally, with workers directly participating in their own potential replacement.","category":"Tech Strategy & Analysis"},{"title":"LACE: Lattice Attention for Cross-thread Exploration","url":"https://arxiv.org/abs/2604.15529","source":"arXiv - AI","score":8,"summary":"LACE introduces a novel framework that enables parallel reasoning paths in large language models to interact and share insights during inference, transforming isolated reasoning into coordinated parallel processes. This represents a significant advancement in AI agent systems by allowing concurrent reasoning threads to correct each other's mistakes.","category":"AI & Research"},{"title":"The Spectral Geometry of Thought: Phase Transitions, Instruction Reversal, Token-Level Dynamics, and Perfect Correctness Prediction in How Transformers Reason","url":"https://arxiv.org/abs/2604.15350","source":"arXiv - Machine Learning","score":8,"summary":"Researchers identify seven core phenomena in how transformer models exhibit 'spectral phase transitions' in their hidden activation spaces when reasoning versus recalling facts, analyzing 11 models across 5 architecture families. The work reveals fundamental insights into how large language models process different types of cognitive tasks at the token level, with implications for understanding and improving AI reasoning capabilities.","category":"AI & Research"},{"title":"Sequential KV Cache Compression via Probabilistic Language Tries: Beyond the Per-Vector Shannon Limit","url":"https://arxiv.org/abs/2604.15356","source":"arXiv - Machine Learning","score":8,"summary":"Research presents a novel approach to KV cache compression that exploits the sequential nature of transformer data, potentially moving beyond current entropy limits by leveraging the model's understanding of language structure. This could significantly improve memory efficiency in large language model deployment, addressing a key bottleneck in AI system scalability.","category":"AI & Research"},{"title":"DeepER-Med: Advancing Deep Evidence-Based Research in Medicine Through Agentic AI","url":"https://arxiv.org/abs/2604.15456","source":"arXiv - AI","score":7,"summary":"Research paper presents DeepER-Med, an agentic AI system for evidence-based medical research that addresses trustworthiness and transparency issues in healthcare AI adoption. The system integrates AI agents with multi-hop information retrieval and reasoning while providing explicit criteria for evidence appraisal.","category":"AI & Research"},{"title":"GIST: Multimodal Knowledge Extraction and Spatial Grounding via Intelligent Semantic Topology","url":"https://arxiv.org/abs/2604.15495","source":"arXiv - AI","score":7,"summary":"GIST presents a new approach for spatial grounding in complex environments using Vision-Language Models, addressing challenges in retail, warehouses, and hospitals. This advances embodied AI capabilities for navigation in semantically-rich, cluttered spaces where traditional computer vision struggles.","category":"AI & Research"},{"title":"Bureaucratic Silences: What the Canadian AI Register Reveals, Omits, and Obscures","url":"https://arxiv.org/abs/2604.15514","source":"arXiv - AI","score":7,"summary":"Academic analysis of Canada's Federal AI Register examining how government transparency tools shape accountability boundaries for AI systems. The research uses systematic framework analysis to reveal what government AI registers reveal and obscure about algorithmic decision-making in public sector.","category":"AI & Research"},{"title":"Preregistered Belief Revision Contracts","url":"https://arxiv.org/abs/2604.15558","source":"arXiv - AI","score":7,"summary":"Research introduces PBRC protocol to prevent dangerous conformity effects in multi-agent AI systems where agents may converge on false conclusions due to social influence rather than evidence. The mechanism separates communication from belief revision to maintain epistemic integrity in deliberative AI systems.","category":"AI & Research"},{"title":"Aletheia: Gradient-Guided Layer Selection for Efficient LoRA Fine-Tuning Across Architectures","url":"https://arxiv.org/abs/2604.15351","source":"arXiv - Machine Learning","score":7,"summary":"Aletheia introduces a gradient-guided method to selectively apply LoRA adapters only to the most task-relevant transformer layers, making fine-tuning more efficient. This represents a meaningful optimization for enterprise deployment of large language models where compute efficiency directly impacts business economics.","category":"AI & Research"}]},{"type":"daily","date":"2026-04-20","run_at":"2026-04-20T16:38:57.385994+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":42,"articles_sent":10,"telegram_messages_sent":12,"big_picture":"**Today's Big Picture**\n\nEnterprise software is rapidly shifting from traditional automation to agentic AI systems that operate autonomously, as evidenced by Adobe's CX Enterprise launch and Publicis's \"transformation complete\" positioning, signaling that the next competitive battleground will be who can deploy self-managing AI workflows most effectively. The infrastructure reality check is hitting hard—from OpenAI halting UK data centers due to energy costs to the broader question of who pays for AI's massive electricity demands—forcing enterprises to factor infrastructure economics into their AI strategies rather than just focusing on software capabilities. For ERP consultants and enterprise buyers, this means the window for traditional system implementations is closing fast, and the focus must shift to AI-native platforms that can handle autonomous operations while planning for the substantial infrastructure investments required to support these next-generation systems.","articles":[{"title":"Adobe Summit 2 /* ═══════════════════════════════════════════════════════════

const APP = {
  data:     [],        // sorted newest-first
  screen:   'today',
  cat:      'all',
  query:    '',
};

/* ═══════════════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════════════ */
const todayStr = () => new Date().toISOString().slice(0, 10);

function scoreColor(s) {
  if (s >= 10) return '#00A550';
  if (s >=  9) return '#0066CC';
  if (s >=  8) return '#6B46C1';
  return '#D47C0A';
}
function scoreBg(s) {
  if (s >= 10) return '#DFFAED';
  if (s >=  9) return '#DCEEFF';
  if (s >=  8) return '#EDE9FB';
  return '#FEF3E2';
}
function scoreEmoji(s) {
  if (s >= 10) return '🔥';
  if (s >=  9) return '⭐';
  if (s >=  8) return '🔵';
  return '🟢';
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function fmtDateShort(str) {
  if (!str) return '';
  const t = todayStr();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayStr = yest.toISOString().slice(0, 10);
  if (str === t)           return 'Today';
  if (str === yesterdayStr) return 'Yesterday';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function fmtDateMed(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getCategories(articles) {
  return [...new Set(articles.map(a => a.category).filter(Boolean))].sort();
}
function topScore(articles) {
  return articles.reduce((m, a) => Math.max(m, a.score || 0), 0);
}

/* ═══════════════════════════════════════════════════════════
   RENDER PIECES
   ══════════════════════════════════════════════════════════ */
function heroHTML(entry) {
  return `
<div class="hero">
  <div class="hero-eyebrow">Today's Big Picture</div>
  <div class="hero-body">${esc(entry.big_picture || 'No summary available.')}</div>
  <div class="hero-footer">${fmtDate(entry.date)}</div>
</div>`;
}

function statsHTML(entry) {
  const arts = entry.articles || [];
  const cats = getCategories(arts);
  const top  = topScore(arts);
  const sc   = scoreColor(top);
  return `
<div class="stats">
  <div class="stat">
    <span class="stat-val">${arts.length}</span>
    <span class="stat-lbl">Articles</span>
  </div>
  <div class="stat">
    <span class="stat-val">${cats.length}</span>
    <span class="stat-lbl">Topics</span>
  </div>
  <div class="stat">
    <span class="stat-val" style="color:${sc}">${scoreEmoji(top)} ${top}</span>
    <span class="stat-lbl">Top Score</span>
  </div>
</div>`;
}

function tabsHTML(articles, active) {
  const cats = getCategories(articles);
  const all  = ['all', ...cats];
  return `
<div class="tabs-scroll">
  <div class="tabs" id="cat-tabs">
    ${all.map(c => `<button class="tab${c === active ? ' active' : ''}" data-c="${esc(c)}">${c === 'all' ? 'All' : esc(c)}</button>`).join('')}
  </div>
</div>`;
}

function cardHTML(article, uid) {
  const s    = article.score || 7;
  const col  = scoreColor(s);
  const bg   = scoreBg(s);
  const url  = esc(article.url || '#');
  const tit  = esc(article.title || 'Untitled');
  const src  = esc(article.source || '');
  const cat  = article.category ? `<span class="dot"></span>${esc(article.category)}` : '';
  const sum  = esc(article.summary || '');
  const why  = article.why ? `
    <div class="card-divider"></div>
    <div class="card-why">💡 ${esc(article.why)}</div>` : '';
  const safe = esc(article.title || '').replace(/&#39;/g,"'");

  return `
<div class="card" id="${uid}">
  <div class="card-top">
    <div class="card-source">${src}${cat}</div>
    <div class="badge" style="background:${bg};color:${col}">${s}</div>
  </div>
  <a class="card-title" href="${url}" target="_blank" rel="noopener noreferrer">${tit}</a>
  <div class="card-summary">${sum}</div>
  <div class="card-expand" id="exp-${uid}">
    ${why}
    <div class="card-actions">
      <a class="btn-read" href="${url}" target="_blank" rel="noopener noreferrer">Read Article →</a>
      <button class="btn-share" data-url="${url}" data-title="${esc(article.title || '')}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
      </button>
    </div>
  </div>
  <button class="card-toggle" id="tog-${uid}" data-uid="${uid}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
    <span>More</span>
  </button>
</div>`;
}

function skeletonHTML() {
  const one = `
<div class="skel-card">
  <div class="skel skel-row" style="width:42%;height:11px"></div>
  <div class="skel skel-row" style="width:84%;height:17px;margin-bottom:10px"></div>
  <div class="skel skel-row" style="width:100%"></div>
  <div class="skel skel-row" style="width:68%"></div>
</div>`;
  return one + one + one;
}

/* ═══════════════════════════════════════════════════════════
   SCREEN RENDERERS
   ══════════════════════════════════════════════════════════ */
function renderToday() {
  const el = document.getElementById('today-inner');
  const t  = todayStr();
  const entry = APP.data.find(d => d.date === t) || APP.data[0];

  if (!entry) {
    el.innerHTML = `
<div class="empty">
  <div class="empty-icon">📬</div>
  <div class="empty-title">No digest yet today</div>
  <div class="empty-body">Check back after 7:30 AM PST</div>
</div>`;
    return;
  }

  const stale = entry.date !== t
    ? `<div class="stale-warn">⚠️ Showing last digest from <strong>${fmtDateShort(entry.date)}</strong> — today's hasn't run yet</div>`
    : '';

  const arts     = entry.articles || [];
  const filtered = APP.cat === 'all' ? arts : arts.filter(a => a.category === APP.cat);
  const cards    = filtered.length
    ? filtered.map((a, i) => cardHTML(a, `t${i}`)).join('')
    : `<div class="empty"><div class="empty-icon">🔎</div><div class="empty-title">No articles in this category</div></div>`;

  el.innerHTML = heroHTML(entry) + statsHTML(entry) + stale + tabsHTML(arts, APP.cat) + cards;

  // Category tab listeners (delegated to tab container)
  document.getElementById('cat-tabs')?.addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    APP.cat = btn.dataset.c;
    renderToday();
    // scroll to tabs
    requestAnimationFrame(() => {
      document.querySelector('.tabs-scroll')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  attachCardListeners(el);
}

function renderWeek() {
  const el   = document.getElementById('week-inner');
  const week = APP.data.slice(0, 7);

  if (!week.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No digests this week</div><div class="empty-body">Digests run daily at 7:30 AM PST</div></div>`;
    return;
  }

  const t = todayStr();
  let html = '<div style="height:6px"></div>';

  week.forEach(entry => {
    const arts   = entry.articles || [];
    const isToday = entry.date === t;
    html += `
<div class="day-group">
  <div class="day-hdr" onclick="toggleDay(this)">
    <div>
      <div class="day-label">${fmtDateShort(entry.date)}${isToday ? '<span class="today-badge">NEW</span>' : ''}</div>
      <div class="day-sub">${arts.length} article${arts.length !== 1 ? 's' : ''} · Top ${scoreEmoji(topScore(arts))} ${topScore(arts)}</div>
    </div>
    <svg class="day-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>
  <div class="day-articles" id="da-${entry.date}">
    ${arts.map((a, i) => cardHTML(a, `w-${entry.date}-${i}`)).join('')}
  </div>
</div>`;
  });

  el.innerHTML = html;
  attachCardListeners(el);
}

function renderArchive() {
  const el = document.getElementById('archive-inner');
  const q  = APP.query.toLowerCase().trim();
  const t  = todayStr();

  if (!APP.data.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🗄️</div><div class="empty-title">No archived digests</div><div class="empty-body">Your digest history will appear here</div></div>`;
    return;
  }

  // Flatten all articles with date context
  let all = [];
  APP.data.forEach(entry => {
    (entry.articles || []).forEach((a, i) => {
      all.push({ ...a, _date: entry.date, _uid: `a-${entry.date}-${i}` });
    });
  });

  if (q) {
    all = all.filter(a =>
      (a.title    || '').toLowerCase().includes(q) ||
      (a.summary  || '').toLowerCase().includes(q) ||
      (a.source   || '').toLowerCase().includes(q) ||
      (a.category || '').toLowerCase().includes(q) ||
      (a.why      || '').toLowerCase().includes(q)
    );
  }

  if (!all.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-body">Try a different search term</div></div>`;
    return;
  }

  // Group by date
  const byDate = {};
  all.forEach(a => { (byDate[a._date] = byDate[a._date] || []).push(a); });

  let html = '';
  Object.keys(byDate)
    .sort((a, b) => b > a ? 1 : -1)
    .forEach(date => {
      const arts = byDate[date];
      const isToday = date === t;
      html += `<div class="section-hdr">${isToday ? 'Today · ' : ''}${fmtDateShort(date)}  ·  ${arts.length} article${arts.length !== 1 ? 's' : ''}</div>`;
      html += arts.map(a => cardHTML(a, a._uid)).join('');
    });

  el.innerHTML = html;
  attachCardListeners(el);
}

/* ═══════════════════════════════════════════════════════════
   INTERACTIONS
   ══════════════════════════════════════════════════════════ */
function attachCardListeners(container) {
  container.addEventListener('click', e => {
    // Toggle expand
    const tog = e.target.closest('.card-toggle');
    if (tog) { toggleCard(tog.dataset.uid); return; }

    // Share button
    const share = e.target.closest('.btn-share');
    if (share) {
      e.preventDefault();
      shareArticle(share.dataset.url, share.dataset.title);
      return;
    }
  }, { capture: false });
}

function toggleCard(uid) {
  const exp = document.getElementById(`exp-${uid}`);
  const tog = document.getElementById(`tog-${uid}`);
  if (!exp) return;

  const opening = !exp.classList.contains('open');
  exp.classList.toggle('open', opening);
  tog.classList.toggle('open', opening);
  tog.querySelector('span').textContent = opening ? 'Less' : 'More';

  if (opening) {
    requestAnimationFrame(() => {
      exp.closest('.card')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }
}

function toggleDay(hdr) {
  const date     = hdr.nextElementSibling.id.replace('da-', '');
  const articles = document.getElementById(`da-${date}`);
  const caret    = hdr.querySelector('.day-caret');
  if (!articles) return;
  const hidden = articles.classList.toggle('hidden');
  caret?.classList.toggle('collapsed', hidden);
}

function shareArticle(url, title) {
  if (navigator.share) {
    navigator.share({ title: title || 'FeedlyVP article', url }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(url)
      .then(() => showToast('Link copied!'))
      .catch(() => {});
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: 'calc(80px + env(safe-area-inset-bottom))',
    left: '50%', transform: 'translateX(-50%)',
    background: '#1a2744', color: '#fff', padding: '10px 20px',
    borderRadius: '20px', fontSize: '13px', fontWeight: '600',
    zIndex: '9999', opacity: '0', transition: 'opacity 0.2s',
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => {
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 200);
  }, 2000);
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════════════ */
function goScreen(name) {
  if (APP.screen === name) return;
  APP.screen = name;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`s-${name}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.s === name));

  if      (name === 'week')    renderWeek();
  else if (name === 'archive') renderArchive();
}

/* ═══════════════════════════════════════════════════════════
   PULL TO REFRESH
   ══════════════════════════════════════════════════════════ */
function setupPTR() {
  const scr = document.getElementById('s-today');
  const ptr = document.getElementById('ptr');
  let y0 = 0, active = false;
  const thresh = 72;

  scr.addEventListener('touchstart', e => {
    if (scr.scrollTop === 0) y0 = e.touches[0].pageY;
  }, { passive: true });

  scr.addEventListener('touchmove', e => {
    if (!y0) return;
    const dy = e.touches[0].pageY - y0;
    if (dy > 20) { active = true; ptr.classList.toggle('show', dy > thresh / 2); }
  }, { passive: true });

  scr.addEventListener('touchend', () => {
    if (active) {
      ptr.classList.remove('show');
      // reload from cached data
      try {
        const c = localStorage.getItem('fvp_data');
        if (c) {
          APP.data = JSON.parse(c).sort((a, b) => b.date > a.date ? 1 : -1);
          renderToday(); updateHeader();
        }
      } catch (_) {}
    }
    y0 = 0; active = false;
  }, { passive: true });
}

/* ═══════════════════════════════════════════════════════════
   SCROLL-BASED HEADER SHADOW
   ══════════════════════════════════════════════════════════ */
function setupHeaderShadow() {
  document.querySelectorAll('.screen').forEach(scr => {
    scr.addEventListener('scroll', () => {
      if (scr.classList.contains('active')) {
        document.getElementById('header').classList.toggle('scrolled', scr.scrollTop > 4);
      }
    }, { passive: true });
  });
}

/* ═══════════════════════════════════════════════════════════
   HEADER DATE
   ══════════════════════════════════════════════════════════ */
function updateHeader() {
  const t  = todayStr();
  const d  = new Date(t + 'T12:00:00');
  document.getElementById('header-date').textContent =
    d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  const latest = APP.data[0];
  document.getElementById('header-upd').textContent = latest
    ? (latest.date === t ? 'Updated today' : `Last: ${fmtDateMed(latest.date)}`)
    : 'No data yet';
}

/* ═══════════════════════════════════════════════════════════
   SEARCH
   ══════════════════════════════════════════════════════════ */
function setupSearch() {
  const inp = document.getElementById('search');
  let timer;
  inp.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => { APP.query = inp.value; renderArchive(); }, 200);
  });
  // clear on x
  inp.addEventListener('search', () => { APP.query = ''; renderArchive(); });
}

/* ═══════════════════════════════════════════════════════════
   SERVICE WORKER
   ══════════════════════════════════════════════════════════ */
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  // Infer base path (works both at root and at /feedlydigest/)
  const base = location.pathname.includes('/feedlydigest')
    ? '/feedlydigest/'
    : '/';
  navigator.serviceWorker.register(base + 'sw.js', { scope: base })
    .catch(err => console.warn('SW:', err));
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════ */
function init() {
  // Merge injected data with localStorage cache (take freshest)
  const injected = (window.DIGEST_DATA || []).sort((a, b) => b.date > a.date ? 1 : -1);
  let cached = [];
  try { cached = JSON.parse(localStorage.getItem('fvp_data') || '[]'); } catch (_) {}

  // Use injected if it has data; otherwise fall back to cache
  APP.data = injected.length ? injected : cached.sort((a, b) => b.date > a.date ? 1 : -1);

  // Persist to cache
  if (APP.data.length) localStorage.setItem('fvp_data', JSON.stringify(APP.data));

  // Wire up nav
  document.getElementById('nav').addEventListener('click', e => {
    const btn = e.target.closest('.nav-btn');
    if (btn) goScreen(btn.dataset.s);
  });

  updateHeader();
  renderToday();
  setupPTR();
  setupSearch();
  setupHeaderShadow();
  registerSW();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
